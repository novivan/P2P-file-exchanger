<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P2P Peer UI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <style>
    body { padding: 1rem 2rem; }
    .card {
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .card h4 { margin: 0 0 0.25rem 0; }
    .meta {
      display: flex;
      gap: 1rem;
      font-size: 0.85rem;
      color: var(--pico-muted-color);
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }
    pre.explanation {
      background: var(--pico-secondary-background);
      padding: 0.5rem;
      font-size: 0.85rem;
      white-space: pre-wrap;
      margin: 0.5rem 0;
    }
    .status { font-size: 0.9rem; margin-top: 0.5rem; }
    .status.ok { color: #2a8a2a; }
    .status.err { color: #c53030; }
    details { margin-bottom: 1.5rem; }
    summary { cursor: pointer; font-weight: bold; font-size: 1.1rem; }
    pre.json {
      background: var(--pico-secondary-background);
      padding: 1rem;
      max-height: 400px;
      overflow: auto;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
<main class="container">
  <h1>P2P Peer</h1>

  <details open>
    <summary>🔎 Search</summary>
    <form id="search-form">
      <label>
        Query
        <input type="text" id="search-query" placeholder="что ищем..." required />
      </label>
      <button type="submit">Search</button>
    </form>
    <div id="search-status" class="status"></div>
    <div id="search-results"></div>
  </details>

  <details>
    <summary>🌱 Seed</summary>
    <form id="seed-form">
      <label>
        File path
        <input type="text" id="seed-path" placeholder="/abs/path/to/file" required />
      </label>
      <label>
        Description (min 30 chars)
        <textarea id="seed-description" rows="4" required></textarea>
      </label>
      <button type="submit">Seed</button>
    </form>
    <div id="seed-status" class="status"></div>
  </details>

  <details>
    <summary>⬇️ Download by ID</summary>
    <form id="download-form">
      <label>
        Manifest ID
        <input type="text" id="download-id" placeholder="uuid" required />
      </label>
      <button type="submit">Download</button>
    </form>
    <div id="download-status" class="status"></div>
  </details>

  <details>
    <summary>📂 My torrents</summary>
    <button id="list-refresh">Refresh</button>
    <pre id="list-output" class="json"></pre>
  </details>

  <details>
    <summary>📜 Manifests on tracker</summary>
    <button id="manifests-refresh">Refresh</button>
    <pre id="manifests-output" class="json"></pre>
  </details>
</main>

<script>
function setStatus(el, ok, msg) {
  el.textContent = msg;
  el.className = "status " + (ok ? "ok" : "err");
}

async function apiJSON(method, path, body) {
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  const text = await r.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch (e) { /* noop */ }
  if (!r.ok) {
    const errMsg = (data && data.error) ? data.error : (text || ("HTTP " + r.status));
    throw new Error(errMsg);
  }
  return data;
}

function fmtScore(v) {
  if (v === undefined || v === null) return "-";
  return Number(v).toFixed(4);
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function renderSearchResults(results) {
  const container = document.getElementById("search-results");
  container.innerHTML = "";
  if (!results || results.length === 0) {
    container.innerHTML = "<p><em>ничего не найдено</em></p>";
    return;
  }
  for (const r of results) {
    const card = document.createElement("div");
    card.className = "card";
    const id = r.ID || "";
    const name = r.Name || "(no name)";
    const desc = r.Description || "";
    const explanation = r.Explanation || "";
    card.innerHTML = `
      <h4>${escapeHTML(name)}</h4>
      <div class="meta">
        <span>ID: <code>${escapeHTML(id)}</code></span>
        <span>Score: <b>${fmtScore(r.Score)}</b></span>
        <span>Cosine: ${fmtScore(r.CosineScore)}</span>
        <span>LLM: ${fmtScore(r.LLMScore)}</span>
      </div>
      <p>${escapeHTML(desc)}</p>
      ${explanation ? `<pre class="explanation">${escapeHTML(explanation)}</pre>` : ""}
    `;
    container.appendChild(card);
  }
}

document.getElementById("search-form").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const query = document.getElementById("search-query").value.trim();
  const statusEl = document.getElementById("search-status");
  if (!query) { setStatus(statusEl, false, "пустой запрос"); return; }
  setStatus(statusEl, true, "Ищу...");
  try {
    const resp = await apiJSON("POST", "/search", { query, top_k: 5 });
    renderSearchResults(resp && resp.results ? resp.results : []);
    setStatus(statusEl, true, "Готово");
  } catch (e) {
    document.getElementById("search-results").innerHTML = "";
    setStatus(statusEl, false, "Ошибка: " + e.message);
  }
});

document.getElementById("seed-form").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const statusEl = document.getElementById("seed-status");
  const body = {
    file_path: document.getElementById("seed-path").value.trim(),
    description: document.getElementById("seed-description").value.trim(),
  };
  setStatus(statusEl, true, "Загружаю...");
  try {
    const resp = await apiJSON("POST", "/seed", body);
    setStatus(statusEl, true, "Готово: " + (resp && resp.manifest_id ? resp.manifest_id : JSON.stringify(resp)));
  } catch (e) {
    setStatus(statusEl, false, "Ошибка: " + e.message);
  }
});

document.getElementById("download-form").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const statusEl = document.getElementById("download-status");
  const id = document.getElementById("download-id").value.trim();
  if (!id) { setStatus(statusEl, false, "пустой id"); return; }
  setStatus(statusEl, true, "Скачиваю...");
  try {
    const resp = await apiJSON("POST", "/download", { manifest_id: id });
    setStatus(statusEl, true, "Готово: " + (resp && resp.manifest_id ? resp.manifest_id : id));
  } catch (e) {
    setStatus(statusEl, false, "Ошибка: " + e.message);
  }
});

document.getElementById("list-refresh").addEventListener("click", async () => {
  const out = document.getElementById("list-output");
  out.textContent = "loading...";
  try {
    const resp = await apiJSON("GET", "/torrents");
    out.textContent = JSON.stringify(resp, null, 2);
  } catch (e) {
    out.textContent = "Error: " + e.message;
  }
});

document.getElementById("manifests-refresh").addEventListener("click", async () => {
  const out = document.getElementById("manifests-output");
  out.textContent = "loading...";
  try {
    const resp = await apiJSON("GET", "/manifests");
    out.textContent = JSON.stringify(resp, null, 2);
  } catch (e) {
    out.textContent = "Error: " + e.message;
  }
});
</script>
</body>
</html>
